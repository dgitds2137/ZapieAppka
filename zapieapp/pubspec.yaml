name: zapieapp_flutter_starter
version: 0.1.0
publish_to: 'none'
environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/BrancMadeImages/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto.ttf
